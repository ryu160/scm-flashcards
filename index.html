<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCM学習フラッシュカード</title>
<style>
  :root {
    --bg: #0f1720;
    --panel: #1a2534;
    --panel-2: #22303f;
    --accent: #4fd1c5;
    --accent-2: #f6ad55;
    --text: #e6edf3;
    --muted: #8fa3b8;
    --known: #38a169;
    --unknown: #e53e3e;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Kaku Gothic ProN", "Segoe UI", system-ui, sans-serif;
    background: linear-gradient(160deg, #0f1720, #142033 60%, #0f1720);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }
  header {
    text-align: center;
    margin-bottom: 18px;
  }
  header h1 {
    font-size: 1.5rem;
    margin: 0 0 4px;
  }
  header p {
    margin: 0;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .toolbar {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 16px;
  }
  select, button.tool-btn {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid #2f4257;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.85rem;
    cursor: pointer;
  }
  button.tool-btn:hover, select:hover { border-color: var(--accent); }
  .stats {
    width: 100%;
    max-width: 640px;
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .progress-bar {
    width: 100%;
    max-width: 640px;
    height: 6px;
    background: var(--panel-2);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    width: 0%;
    transition: width 0.3s ease;
  }
  .card-wrap {
    perspective: 1400px;
    width: 100%;
    max-width: 640px;
    height: 320px;
    margin-bottom: 20px;
  }
  .card {
    position: relative;
    width: 100%;
    height: 100%;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(.4,.2,.2,1);
  }
  .card.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: var(--radius);
    padding: 28px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    border: 1px solid #2f4257;
  }
  .face.front {
    background: linear-gradient(155deg, var(--panel), var(--panel-2));
  }
  .face.back {
    background: linear-gradient(155deg, #1c2b22, #22403a);
    transform: rotateY(180deg);
  }
  .badge {
    position: absolute;
    top: 14px;
    left: 16px;
    font-size: 0.7rem;
    padding: 3px 10px;
    border-radius: 100px;
    background: rgba(79, 209, 197, 0.15);
    color: var(--accent);
    border: 1px solid rgba(79, 209, 197, 0.4);
  }
  .card-index {
    position: absolute;
    top: 14px;
    right: 16px;
    font-size: 0.7rem;
    color: var(--muted);
  }
  .q-text {
    font-size: 1.15rem;
    line-height: 1.6;
    font-weight: 600;
  }
  .a-text {
    font-size: 1rem;
    line-height: 1.7;
    color: #d7f5ee;
  }
  .hint {
    margin-top: 16px;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 640px;
  }
  .controls button {
    flex: 1 1 auto;
    min-width: 90px;
    padding: 12px 14px;
    border-radius: 10px;
    border: none;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s ease, opacity 0.2s;
  }
  .controls button:active { transform: scale(0.97); }
  #knownBtn {
    background: var(--known);
    color: white;
  }
  #unknownBtn {
    background: var(--unknown);
    color: white;
  }
  #shuffleBtn {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
  }
  footer {
    margin-top: 30px;
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>🧭 SCM(サプライチェーン管理)学習フラッシュカード</h1>
  <p>需要予測・在庫理論・生産計画・物流・システムアーキテクチャを資格試験レベルで反復学習</p>
</header>

<div class="toolbar">
  <select id="categorySelect"></select>
  <select id="modeSelect">
    <option value="all">全カード</option>
    <option value="unknown">未習得のみ</option>
  </select>
  <button class="tool-btn" id="resetProgressBtn">進捗をリセット</button>
</div>

<div class="stats">
  <span id="statsText">0 / 0</span>
  <span id="masteredText">習得済み: 0</span>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="card-wrap" id="cardWrap">
  <div class="card" id="card">
    <div class="face front">
      <span class="badge" id="badgeFront"></span>
      <span class="card-index" id="indexFront"></span>
      <div class="q-text" id="qText"></div>
      <div class="hint">クリックして解答を表示</div>
    </div>
    <div class="face back">
      <span class="badge" id="badgeBack"></span>
      <span class="card-index" id="indexBack"></span>
      <div class="a-text" id="aText"></div>
      <div class="hint">クリックして質問に戻る</div>
    </div>
  </div>
  <div class="empty-state" id="emptyState" style="display:none;">🎉 このカテゴリはすべて習得済みです！<br>「全カード」モードに切り替えると復習できます。</div>
</div>

<div class="controls">
  <button id="unknownBtn">✗ もう一度</button>
  <button id="knownBtn">✓ わかった</button>
</div>
<div class="controls" style="margin-top:10px;">
  <button id="shuffleBtn">🔀 シャッフル</button>
</div>

<footer>進捗はブラウザのlocalStorageに保存されます。カードは DECK 配列内で自由に追加・編集できます。</footer>

<script>
const DECK = [
  // SCM基礎・戦略
  { id: 100, cat: "SCM基礎・戦略", q: "SCORモデルとは何か？", a: "Supply Chain Council（現ASCMの一部）が策定した、サプライチェーンの業務プロセスを標準化して診断・比較するためのプロセス参照モデル。" },
  { id: 101, cat: "SCM基礎・戦略", q: "SCORモデルの6つの中核プロセスを挙げよ。", a: "Plan（計画）、Source（調達）、Make（製造）、Deliver（配送）、Return（返品）、Enable（実現・管理）。" },
  { id: 102, cat: "SCM基礎・戦略", q: "SCORの「Plan」プロセスの内容は？", a: "需給を突き合わせ、調達・生産・配送の最適な行動指針を立てる。" },
  { id: 111, cat: "SCM基礎・戦略", q: "SCORの「Source」プロセスの内容は？", a: "計画・実需に応じて財・サービスを調達する。" },
  { id: 112, cat: "SCM基礎・戦略", q: "SCORの「Deliver」プロセスの内容は？", a: "完成品・サービスを顧客に届ける（受注管理・輸送管理・配送管理を含む）。" },
  { id: 103, cat: "SCM基礎・戦略", q: "プッシュ型のサプライチェーン戦略とは？", a: "需要予測に基づき、上流工程をあらかじめ計画・生産する方式。" },
  { id: 110, cat: "SCM基礎・戦略", q: "プル型のサプライチェーン戦略とは？", a: "実際の顧客注文をトリガーに、下流工程を動かす方式。" },
  { id: 104, cat: "SCM基礎・戦略", q: "デカップリングポイント（押し引きの分岐点）とは？", a: "サプライチェーン上で、上流（予測ベース＝プッシュ）と下流（受注ベース＝プル）の境界となる地点。在庫をどこに、どれだけ持つかを左右する設計上の要点。" },
  { id: 105, cat: "SCM基礎・戦略", q: "VMI（Vendor Managed Inventory）とは？", a: "顧客ではなくサプライヤー（供給者）側が、顧客の在庫補充のタイミングと数量を決定する仕組み。POSデータ等の共有によりブルウィップ効果の抑制にも寄与する。" },
  { id: 106, cat: "SCM基礎・戦略", q: "CPFR（Collaborative Planning, Forecasting and Replenishment）とは何か？", a: "サプライチェーンパートナー間で計画・予測・補充を協働して行う枠組み。VMIより広い概念で、VMIはCPFRの一部・実装形態の一つと位置づけられる。" },
  { id: 107, cat: "SCM基礎・戦略", q: "ブルウィップ効果とは何か？", a: "小売レベルでの需要のわずかな変動が、卸・流通・製造といった上流に向かうにつれて増幅されていく現象。" },
  { id: 108, cat: "SCM基礎・戦略", q: "ブルウィップ効果の4大要因を挙げよ。", a: "需要予測の逐次更新（デマンドシグナル処理）、オーダーバッチング（まとめ発注）、価格変動、品不足時の便乗発注（rationing game）。" },
  { id: 109, cat: "SCM基礎・戦略", q: "ブルウィップ効果を緩和する代表的な施策は？", a: "POS実需データの共有（VMI/CPFR）、発注ロットの縮小、価格変動（プロモーション）の抑制、リードタイムの短縮など。" },
  { id: 113, cat: "SCM基礎・戦略", q: "SCORモデルを構成する4つの主要セクションを挙げよ。", a: "Performance（パフォーマンス）、Processes（プロセス）、Practices（実践手法）、People（人材・スキル）。" },
  { id: 114, cat: "SCM基礎・戦略", q: "SCORの5つのパフォーマンス属性を挙げよ。", a: "Reliability（信頼性）、Responsiveness（俊敏性/応答性）、Agility（機敏性）、Cost（コスト）、Asset Management Efficiency（資産管理効率）。" },
  { id: 115, cat: "SCM基礎・戦略", q: "SCORのReliability（信頼性）属性を代表するLevel-1指標は？", a: "Perfect Order Fulfillment（完全注文達成率、コード：RL.1.1）。" },
  { id: 116, cat: "SCM基礎・戦略", q: "SCORのResponsiveness（俊敏性）属性を代表するLevel-1指標は？", a: "Order Fulfillment Cycle Time（受注から納品までのサイクルタイム、コード：RS.1.1）。" },
  { id: 117, cat: "SCM基礎・戦略", q: "SCORのAgility（機敏性）属性に含まれる3つのLevel-1指標を挙げよ。", a: "Upside Supply Chain Adaptability（上振れ対応力）、Downside Supply Chain Adaptability（下振れ対応力）、Overall Value at Risk（リスク総額）。" },
  { id: 118, cat: "SCM基礎・戦略", q: "SCORのAsset Management Efficiency（資産管理効率）属性の代表的なLevel-1指標を3つ挙げよ。", a: "Cash-to-Cash Cycle Time、Return on Supply Chain Fixed Assets（サプライチェーン固定資産利益率）、Return on Working Capital（運転資本利益率）。" },
  { id: 119, cat: "SCM基礎・戦略", q: "SCORのプロセス階層におけるLevel1〜Level4はそれぞれ何を定義するか。", a: "Level1：プロセスの範囲・内容・目標。Level2：オペレーション戦略（Make-to-Stock/Make-to-Order/Engineer-to-Order等）。Level3：個々のプロセスの構成（インプット・アウトプット・ベストプラクティス）。Level4：カイゼン・リーン・シックスシグマなどの改善活動。" },
  { id: 120, cat: "SCM基礎・戦略", q: "SCORのプロセスコード化で「sD1.2」という表記は何を表すか。", a: "s＝SCOR、D＝Deliverプロセス（Level1）、1＝Level2の分類番号、.2＝Level3の個別プロセス番号。sD1.2は「受注の受領・入力・検証」を表す。" },
  { id: 121, cat: "SCM基礎・戦略", q: "SCORのPracticesにおける3つの分類を挙げよ。", a: "Emerging Practices（新興、BP.E）、Best Practices（最良、BP.B）、Standard Practices（標準、BP.S）。" },
  { id: 122, cat: "SCM基礎・戦略", q: "SCORのPeopleセクションが定義する5段階の習熟度レベルを挙げよ。", a: "Novice（未経験）、Beginner（初級）、Competent（習熟）、Proficient（熟練）、Expert（エキスパート）。" },
  { id: 123, cat: "SCM基礎・戦略", q: "SCOR改善手法「SCOR Racetrack」を構成する5つのステップは？", a: "Pre-SCOR Program Steps（事前準備）、Set the Scope（範囲設定）、Configure the Supply Chain（サプライチェーン構成）、Optimize Projects（プロジェクト最適化）、Ready for Implementation（実装準備）。" },
  { id: 124, cat: "SCM基礎・戦略", q: "延期戦略（ポストポーンメント）とは何か。", a: "最終組立・生産・包装などの活動を可能な限り遅らせる戦略。完成品在庫の過剰保有を避けつつ、顧客注文に応じたカスタマイズの機会を最大化する。" },

  // 需要予測
  { id: 200, cat: "需要予測", q: "移動平均法（Moving Average）による需要予測の考え方は？", a: "直近n期間の実績の単純平均を次期予測値とする手法。短期的な変動を平滑化し、トレンド把握に向く。" },
  { id: 201, cat: "需要予測", q: "指数平滑法（Exponential Smoothing）の計算式は？", a: "F(t+1) = α×D(t) + (1-α)×F(t)。直近の実需要D(t)と直前の予測値F(t)を平滑化係数αで加重平均する。" },
  { id: 202, cat: "需要予測", q: "指数平滑法における平滑化係数αを大きくするとどうなるか？", a: "直近の実需要変化に対して予測がより敏感（反応的）になる。ただしαが大きすぎるとノイズに過剰反応するリスクがある。" },
  { id: 203, cat: "需要予測", q: "需要予測の精度を測る代表的な指標を3つ挙げよ。", a: "MAE（平均絶対誤差）、MAPE（平均絶対パーセント誤差）、RMSE（二乗平均平方根誤差）。" },
  { id: 204, cat: "需要予測", q: "MAPE（平均絶対パーセント誤差）がSKU間比較に向いている理由は？", a: "誤差を金額や数量ではなくパーセンテージで表現するため、需要規模が異なるSKU同士でも精度を横並びで比較できる。" },
  { id: 205, cat: "需要予測", q: "予測精度（MAPE）の改善が安全在庫に与える一般的な効果は？", a: "一般に、MAPEを10ポイント改善すると、サービスレベルを維持したまま安全在庫を10〜30%程度削減できるとされる。" },
  { id: 206, cat: "需要予測", q: "需要計画における「集約（アグリゲーション）」の考え方とは？", a: "個々のSKU単位よりも、カテゴリ・地域・期間などで集約したレベルの方が需要変動が相殺され、予測誤差率が小さくなる傾向を利用する考え方。" },

  // 在庫理論
  { id: 300, cat: "在庫理論", q: "EOQ（経済的発注量）の計算式は？", a: "EOQ = √(2DS/H)。D：年間需要量、S：1回あたりの発注コスト、H：単位あたりの年間保管コスト。" },
  { id: 301, cat: "在庫理論", q: "EOQモデルが最小化しようとしているコストは何か？", a: "発注コスト（発注回数を減らすほど下がる）と保管コスト（在庫を減らすほど下がる）のトレードオフの合計、すなわち総在庫関連コスト。" },
  { id: 302, cat: "在庫理論", q: "安全在庫（Safety Stock）の基本計算式は？", a: "安全在庫 = Z値（サービスレベルに対応）× リードタイム中の需要の標準偏差。需要・リードタイム双方の変動を考慮するより厳密な式も存在する。" },
  { id: 303, cat: "在庫理論", q: "発注点（Reorder Point, ROP）の計算式は？", a: "ROP = 平均日次需要 × リードタイム + 安全在庫。" },
  { id: 304, cat: "在庫理論", q: "サービスレベル95%に対応するZ値はおよそいくつか？", a: "約1.65。サービスレベルを高めるほどZ値は大きくなり、必要な安全在庫も増える。" },
  { id: 305, cat: "在庫理論", q: "ABC分析とは何か？", a: "在庫アイテムを金額影響度等で3グループ（A：少数だが影響大、B：中間、C：多数だが影響小）に分類し、管理の手間をメリハリづける手法。" },
  { id: 306, cat: "在庫理論", q: "多階層在庫最適化（Multi-Echelon Inventory Optimization, MEIO）とは？", a: "サプライヤー・工場・DC・店舗など複数の階層（エシュロン）を一つのシステムとして捉え、ある階層の在庫が他階層に必要な在庫量に与える影響まで考慮して、ネットワーク全体で最適な在庫配置を決める手法。" },
  { id: 307, cat: "在庫理論", q: "従来の在庫計算（単一階層アプローチ）がMEIOに劣る点は？", a: "各拠点の在庫を独立に計算するため、拠点間の補充関係による相互作用を見落とし、ネットワーク全体では過剰・過少在庫が生じやすい。" },
  { id: 308, cat: "在庫理論", q: "JIT（ジャストインタイム）の基本思想は？", a: "必要なものを、必要な時に、必要な量だけ生産・調達し、在庫を最小化するという考え方。かんばん方式などのプル型の仕組みで実現される。" },
  { id: 309, cat: "在庫理論", q: "かんばん方式における「プル（pull）」の意味は？", a: "後工程が実際に使った分だけ、かんばん（指示票）を用いて前工程に生産・補充を指示する仕組み。需要が生産を引っ張る形になる。" },

  // 生産計画・MRP
  { id: 400, cat: "生産計画・MRP", q: "MPS（基準生産計画）とは何か？", a: "生産計画（Production Plan）をより詳細な製品・数量・時期レベルに落とし込んだ計画。MRPの起点となる。" },
  { id: 401, cat: "生産計画・MRP", q: "RCCP（大まかな能力計画）の目的は？", a: "MPSが、ボトルネック設備や主要人員など少数の重要資源の能力範囲内で実行可能かどうかを、集約レベル・中期（概ね3〜18ヶ月）で検証すること。" },
  { id: 402, cat: "生産計画・MRP", q: "CRP（能力所要量計画）とは何か？", a: "MRP展開後の全ワークセンターを対象に、詳細な負荷（能力所要量）を計算する能力計画の手法。RCCPより詳細なレベルで実行可能性を検証する。" },
  { id: 403, cat: "生産計画・MRP", q: "MRPにおける「総所要量（Gross Requirement）」の算出方法は？", a: "BOM展開により、MPS上の最終製品数量を、それを構成する各部品・原材料の必要数量に分解して求める。" },
  { id: 404, cat: "生産計画・MRP", q: "MRPにおける「正味所要量（Net Requirement）」の計算式は？", a: "正味所要量 = 総所要量 − 手持在庫 − 入庫予定（スケジュールド・レシート）。" },
  { id: 405, cat: "生産計画・MRP", q: "MRPにおける「タイムフェーズ（時間展開）」とオフセットの考え方は？", a: "計画発注（Planned Order）の発注時期を、必要時期からその品目のリードタイム分だけ前倒し（オフセット）して算出すること。" },
  { id: 406, cat: "生産計画・MRP", q: "MRPのロットサイジング手法を3つ以上挙げよ。", a: "Lot-for-Lot（正味所要量そのまま発注）、固定発注量（Fixed Order Quantity）、期間発注量（Period Order Quantity）、EOQベースのロットサイジングなど。" },
  { id: 407, cat: "生産計画・MRP", q: "S&OPからMRP・CRPまでの計画詳細化の流れを説明せよ。", a: "S&OPが集約レベルの生産目標を設定→MPSが製品・数量・時期を specify→RCCPがMPSの実行可能性を検証→MRPがBOM展開して詳細な所要量・発注計画を生成→CRPが全ワークセンターの負荷を検証、という流れで詳細化されていく。" },
  { id: 408, cat: "生産計画・MRP", q: "Available-to-Promise（ATP）とは何か。", a: "顧客の希望出荷日に対して約束可能な製品数量。通常、将来の入荷予定を考慮して時間軸で管理される（時間フェーズATP）。" },
  { id: 409, cat: "生産計画・MRP", q: "Capable-to-Promise（CTP）とは何か。", a: "ATPと同様の考え方に加え、部品在庫だけでなく労働力・設備の稼働可能状況も考慮し、指定日までに構成・組立が可能かを判定する、より高度な引当ロジック。" },
  { id: 410, cat: "生産計画・MRP", q: "制約理論（Theory of Constraints, TOC）とは何か。", a: "生産量は一連の制約（work center容量、部品availability、資金等）によって決定されるという生産管理理論。総スループットは最小の制約（ボトルネック）の容量を超えられない。" },

  // 物流・貿易
  { id: 500, cat: "物流・貿易", q: "WMS（倉庫管理システム）の主要機能を4つ以上挙げよ。", a: "入荷、格納（Put-away）、在庫管理、ピッキング、梱包、出荷。" },
  { id: 501, cat: "物流・貿易", q: "クロスドッキングとは何か？", a: "入荷した商品をほとんど在庫として保管せず、短時間で仕分け・積み替えして出荷する物流手法。保管・回収作業を排除し、リードタイムを短縮する。" },
  { id: 502, cat: "物流・貿易", q: "スロッティング（Slotting）とは何か？", a: "商品特性（出荷頻度・サイズ・重量など）に応じて、倉庫内の最適な保管・ピッキング位置を割り当てる仕組み。ピッキング効率に直結する。" },
  { id: 503, cat: "物流・貿易", q: "TMS（輸送管理システム）の主要機能を3つ以上挙げよ。", a: "経路（ルート）最適化、キャリア（輸送業者）選定、積載計画（ロードプランニング）、運賃精算監査、実績分析。" },
  { id: 504, cat: "物流・貿易", q: "TMSにおける「ロードオプティマイゼーション」の目的は？", a: "車両・コンテナの積載スペースを最大限活用しつつコストを最小化する、最適な積み方・輸送計画を決定すること。空荷輸送（エンプティマイル）の削減にも寄与する。" },
  { id: 505, cat: "物流・貿易", q: "Incoterms（インコタームズ）とは何か？", a: "国際商業会議所（ICC）が定める、国際貿易における売主・買主間の費用・リスク負担の分岐点を定義する定型取引条件。" },
  { id: 506, cat: "物流・貿易", q: "EXW（Ex Works）条件の特徴は？", a: "売主指定場所で商品を引き渡すのみで、その後の費用・リスクはすべて買主負担。売主の義務が最も軽い条件。" },
  { id: 507, cat: "物流・貿易", q: "FOB（Free on Board）条件でリスクが移転するタイミングは？", a: "指定積出港で商品が本船に積み込まれた時点。それ以降の運賃・保険・リスクは買主負担となる。" },
  { id: 508, cat: "物流・貿易", q: "DDP（Delivered Duty Paid）条件の特徴は？", a: "関税通関を含め、指定仕向地に商品を届けるまでの全ての費用とリスクを売主が負担する、売主の義務が最も重い条件。" },
  { id: 509, cat: "物流・貿易", q: "CIF（Cost, Insurance and Freight）条件とは？", a: "売主が仕向港までの運賃・保険を負担する条件。ただしリスクは積出港で買主へ移転する。" },
  { id: 510, cat: "物流・貿易", q: "CFR（Cost and Freight）条件とは？", a: "売主が仕向港までの運賃を負担する条件（保険は買主負担）。リスクは積出港で買主へ移転する。" },
  { id: 511, cat: "物流・貿易", q: "サードパーティ・ロジスティクス（3PL）とは何か。", a: "企業のロジスティクス業務の全部または一部を、専門の外部業者にアウトソーシングすること。輸送・倉庫保管・クロスドッキング・在庫管理・梱包・貨物利用運送などのサービスを含む。" },
  { id: 512, cat: "物流・貿易", q: "フォースパーティ・ロジスティクス（4PL）とは何か。", a: "複数の3PL業者を含むサプライチェーン全体を、単一の窓口として統合管理する組織形態。顧客企業の主要なSCM窓口として機能し、自らは車両・倉庫などの資産を保有しないことが多い。" },
  { id: 513, cat: "物流・貿易", q: "総所有コスト（Total Cost of Ownership, TCO）とは何か。", a: "購入価格だけでなく、輸送・保管・損傷/目減り・税金・保険、さらに設置・保守・廃棄費用まで含めた、資産取得に伴う総コスト。" },
  { id: 514, cat: "物流・貿易", q: "FCA（Free Carrier）条件の特徴は？", a: "売主が指定された運送人に商品を引き渡した時点で、売主の義務が果たされたとみなされる条件。" },

  // システムアーキテクチャ
  { id: 600, cat: "システムアーキテクチャ", q: "ERP（企業資源計画）はサプライチェーンシステムの中でどのような役割を担うか？", a: "受注・財務・資材管理などの基幹業務を担い、サプライチェーン全体の戦略的な方向性を示すシステム。" },
  { id: 606, cat: "システムアーキテクチャ", q: "APS（先進的計画・スケジューリングシステム）はサプライチェーンシステムの中でどのような役割を担うか？", a: "実際の設備能力・人員・段取りなどの制約を考慮して、実行可能な詳細スケジュールを作成するシステム。" },
  { id: 607, cat: "システムアーキテクチャ", q: "MES（製造実行システム）はサプライチェーンシステムの中でどのような役割を担うか？", a: "APSが立てたスケジュールを現場で実行し、実績データをリアルタイムでフィードバックするシステム。" },
  { id: 601, cat: "システムアーキテクチャ", q: "多くのERPの標準スケジューリング機能（MRP）の限界は？", a: "能力を無限とみなす「無限能力計画」が基本であり、設備・人員などの実際の制約を考慮しない場合が多い。" },
  { id: 603, cat: "システムアーキテクチャ", q: "APSが計画立案に利用する主なデータソースを3つ以上挙げよ。", a: "ERP由来の受注・品目マスタ・BOM・ルーティング・在庫・購買データに加え、MES・WMS・労務・サプライヤーデータなど。" },
  { id: 604, cat: "システムアーキテクチャ", q: "計画と実行の「クローズドループ」とは何を指すか？", a: "APSが立てた計画をMESが現場で実行し、その実績データがAPSにフィードバックされて再計画される、計画と実行が連続的に結びついた仕組み。" },
  { id: 605, cat: "システムアーキテクチャ", q: "APS（Advanced Planning & Scheduling）がプロアクティブと評される理由は？", a: "制約を事前に織り込んだスケジュールを能動的に作成するため、実行不可能な計画による手戻りを未然に防げるから。" },

  // KPI・パフォーマンス指標
  { id: 700, cat: "KPI・パフォーマンス指標", q: "OTIF（On-Time In-Full）とは何を測る指標か？", a: "注文が「約束された納期通り（On-Time）」かつ「数量・内容に過不足なく（In-Full）」納品されたかを測る指標。サプライチェーンの最重要KPIの一つとされる。" },
  { id: 701, cat: "KPI・パフォーマンス指標", q: "パーフェクトオーダー率とは何か？", a: "納期遵守・数量過不足なし（OTIFの2条件）に加え、破損なし・書類/請求の正確性なども満たした、より包括的な「完璧な注文」の達成率を示す指標。" },
  { id: 702, cat: "KPI・パフォーマンス指標", q: "キャッシュ・トゥ・キャッシュ・サイクルタイムとは？", a: "サプライヤーへの支払いから顧客からの入金までの日数。運転資本の効率性を示す指標で、優良企業では1ヶ月未満とされる。" },
  { id: 703, cat: "KPI・パフォーマンス指標", q: "在庫回転率（Inventory Turnover）とは何を示す指標か？", a: "一定期間内に在庫が何回販売・補充されたかを示す指標。一般的な健全な範囲は年5〜10回転程度とされる。" },
  { id: 704, cat: "KPI・パフォーマンス指標", q: "OTIFの一般的な優良水準の目安は？", a: "85〜95%程度が良好とされ、業界トップ企業はさらに高い水準を目標とする。" },

  // 用語集
  { id: 900, cat: "用語集", q: "Bill of Lading（船荷証券）とは？", a: "運送契約の証拠として、運送人が貨物の受託を証明し、荷送人と運送人間の契約内容を記載する書類。" },
  { id: 901, cat: "用語集", q: "Waybill（運送状）とは？", a: "貨物の記述・出発地/到着地・荷送人/荷受人などを記載した運送書類。船荷証券と異なり有価証券ではない。" },
  { id: 902, cat: "用語集", q: "Demurrage（滞船料/保管超過料）とは？", a: "コンテナや船舶が定められた無料期間を超えて港・ターミナルに留まった場合に課される追加料金。" },
  { id: 903, cat: "用語集", q: "Detention（留置料）とは？", a: "コンテナや車両が荷主側の都合で規定時間を超えて返却されない場合に課される追加料金。" },
  { id: 904, cat: "用語集", q: "Drayage（ドレージ）とは？", a: "港湾・鉄道ターミナルなど近距離での貨物の陸上輸送。" },
  { id: 905, cat: "用語集", q: "Freight Forwarder（貨物利用運送事業者）とは？", a: "荷主と運送人の間に立ち、輸送手配・書類作成・通関などを代行する事業者。" },
  { id: 906, cat: "用語集", q: "NVOCC（非船舶運航業者）とは？", a: "自らは船舶を保有せず、海上輸送サービスを提供する業者。LCL貨物の混載を行うことが多い。" },
  { id: 907, cat: "用語集", q: "Full Container Load（FCL）とは？", a: "コンテナ1本を単独の荷主が専有する輸送形態。" },
  { id: 908, cat: "用語集", q: "Less-than-Container Load（LCL）とは？", a: "複数荷主の貨物を1つのコンテナに混載する輸送形態。" },
  { id: 909, cat: "用語集", q: "Twenty-foot Equivalent Unit（TEU）とは？", a: "コンテナ輸送量を表す標準単位。20フィートコンテナ1本を1TEUとする。" },
  { id: 910, cat: "用語集", q: "Backhaul（帰り荷）とは？", a: "輸送車両が目的地から出発地に戻る際の輸送区間。復路に貨物を積めるかがコスト効率を左右する。" },
  { id: 911, cat: "用語集", q: "Deadhead（空車回送）とは？", a: "貨物を積まずに輸送車両を回送すること。" },
  { id: 912, cat: "用語集", q: "Break-Bulk（貨物の分割配送）とは？", a: "まとめられた大口貨物を最終目的地ごとに小口へ分割して配送する物流手法。" },
  { id: 913, cat: "用語集", q: "Bonded Warehouse（保税倉庫）とは？", a: "関税未払いの輸入貨物を、関税支払いまたは再輸出まで保管できる税関管理下の倉庫。" },
  { id: 914, cat: "用語集", q: "Free Time（フリータイム）とは？", a: "コンテナ・貨物が追加料金なしで保管・留置できる猶予期間。" },
  { id: 915, cat: "用語集", q: "Milk Run（ミルクラン）とは？", a: "1台の車両が複数のサプライヤーを巡回して集荷する配送方式。酪農業界の牛乳集荷に由来する。" },
  { id: 916, cat: "用語集", q: "Reefer（冷蔵コンテナ/冷凍車）とは？", a: "温度管理が必要な貨物を輸送するための冷蔵・冷凍設備付きの輸送機材。" },
  { id: 917, cat: "用語集", q: "Consignee（荷受人）とは？", a: "貨物の届け先として指定された受取人。" },
  { id: 918, cat: "用語集", q: "Consignor（荷送人）とは？", a: "貨物の発送元となる当事者。シッパーとも呼ばれる。" },
  { id: 919, cat: "用語集", q: "Intermodal Transportation（複合一貫輸送）とは？", a: "トラック・鉄道・船舶など2つ以上の輸送モードを組み合わせて行う輸送。" },
  { id: 920, cat: "用語集", q: "Consolidation（貨物混載）とは？", a: "複数の小口貨物をまとめて輸送し、コストを削減する手法。" },
  { id: 921, cat: "用語集", q: "Load Tender（積載オファー）とは？", a: "荷主が運送業者に対して行う、輸送の引き受け依頼。" },
  { id: 922, cat: "用語集", q: "Common Carrier（公共運送業者）とは？", a: "一般公衆向けに運送サービスを提供する、規制対象の運送業者。" },
  { id: 923, cat: "用語集", q: "Private Carrier（自家用運送）とは？", a: "自社の貨物のみを、自社所有または契約の車両で輸送する形態。" },
  { id: 924, cat: "用語集", q: "Port of Discharge（陸揚げ港）とは？", a: "船舶から貨物が荷降ろしされる港。" },
  { id: 925, cat: "用語集", q: "Air Waybill（航空運送状, AWB）とは？", a: "航空貨物輸送における運送契約書兼受取証。" },
  { id: 926, cat: "用語集", q: "Hub and Spoke（ハブアンドスポーク）とは？", a: "中心拠点（ハブ）に貨物を集約し、そこから各拠点（スポーク）へ再配送するネットワーク構造。" },
  { id: 927, cat: "用語集", q: "Less-than-Truckload（LTL）とは？", a: "トラック1台分に満たない小口貨物の輸送サービス。複数荷主の貨物を混載して運ぶ。" },
  { id: 928, cat: "用語集", q: "Truckload（TL）とは？", a: "トラック1台を専有する輸送形態。" },
  { id: 929, cat: "用語集", q: "Line Haul（幹線輸送）とは？", a: "拠点間を結ぶ長距離の輸送区間。" },
  { id: 930, cat: "用語集", q: "Last-Mile Delivery（ラストマイル配送）とは？", a: "配送拠点から最終消費者までの、物流網における最後の区間の配送。" },
  { id: 931, cat: "用語集", q: "Cold Chain（コールドチェーン）とは？", a: "生産から消費まで一貫して低温を保ちながら輸送・保管する物流システム。" },
  { id: 932, cat: "用語集", q: "Cycle Counting（サイクルカウント）とは？", a: "在庫全体を一斉に数えるのではなく、品目ごとに周期を決めて継続的に実施する棚卸手法。" },
  { id: 933, cat: "用語集", q: "Put-away（格納）とは？", a: "入荷した商品を検品後、倉庫内の保管場所へ収納する作業。" },
  { id: 934, cat: "用語集", q: "Wave Picking（ウェーブピッキング）とは？", a: "複数の出荷先向けのピッキングを、決められたタイミング（ウェーブ）ごとにまとめて実行する方式。" },
  { id: 935, cat: "用語集", q: "Batch Picking（バッチピッキング）とは？", a: "複数の注文をまとめて同時にピッキングし、後で仕分ける方式。" },
  { id: 936, cat: "用語集", q: "Zone Picking（ゾーンピッキング）とは？", a: "倉庫をゾーンに分割し、各作業者が担当ゾーン内のみをピッキングする方式。" },
  { id: 937, cat: "用語集", q: "First In, First Out（FIFO）とは？", a: "先に入庫した在庫から先に出庫する在庫管理の原則。" },
  { id: 938, cat: "用語集", q: "Last In, First Out（LIFO）とは？", a: "後から入庫した在庫を先に出庫したとみなす会計上の評価方法。" },
  { id: 939, cat: "用語集", q: "First Expired, First Out（FEFO）とは？", a: "消費期限・使用期限が早い在庫から先に出庫する管理原則。主に食品・医薬品で使われる。" },
  { id: 940, cat: "用語集", q: "Min-Max System（Min-Max方式）とは？", a: "在庫が最小水準（Min）を下回ったら、最大水準（Max）まで補充発注する在庫管理方式。" },
  { id: 941, cat: "用語集", q: "Two-Bin System（ツービン方式）とは？", a: "2つの容器（ビン）を使い、片方が空になったら発注し、もう片方の在庫で消費を継続するシンプルな補充方式。" },
  { id: 942, cat: "用語集", q: "Consignment Inventory（委託在庫）とは？", a: "販売されるまで所有権をサプライヤー側が保持したまま、顧客先に置かれる在庫。" },
  { id: 943, cat: "用語集", q: "Honeycombing（ハニカムロス）とは？", a: "パレット・ラックの一部出庫により生じる、利用できない空きスペース。倉庫保管効率の低下要因。" },
  { id: 944, cat: "用語集", q: "Dock-to-Stock（ドック・トゥ・ストック）とは？", a: "入荷から棚入れまでの一連のプロセス、またはそれに要する時間。" },
  { id: 945, cat: "用語集", q: "Pick-to-Light（ピック・トゥ・ライト）とは？", a: "棚に設置したランプが次にピックすべき場所と数量を示す、ピッキング支援システム。" },
  { id: 946, cat: "用語集", q: "Yard Management System（ヤード管理システム, YMS）とは？", a: "倉庫・物流拠点の敷地内におけるトラック・トレーラーの入退場と待機を管理するシステム。" },
  { id: 947, cat: "用語集", q: "Available Inventory（有効在庫）とは？", a: "引当・予約・不良分を差し引いた、実際に使用可能な在庫量。" },
  { id: 948, cat: "用語集", q: "Anticipation Inventory（見越し在庫）とは？", a: "季節変動・プロモーションなど予測される需要増に備え、通常より多く保有する在庫。" },
  { id: 949, cat: "用語集", q: "Hedge Inventory（ヘッジ在庫）とは？", a: "価格高騰や供給途絶などのリスクに備えて保有する余分な在庫。" },
  { id: 950, cat: "用語集", q: "Pipeline Inventory（パイプライン在庫）とは？", a: "発注済みでまだ受領していない、輸送中・製造中の在庫。" },
  { id: 951, cat: "用語集", q: "Days of Supply（在庫日数）とは？", a: "現在の在庫で、平均的な消費ペースにおいて何日分の需要をカバーできるかを示す指標。" },
  { id: 952, cat: "用語集", q: "Aggregate Inventory（総在庫）とは？", a: "複数拠点・複数SKUを合算した在庫全体の量。" },
  { id: 953, cat: "用語集", q: "Order Point System（発注点方式）とは？", a: "在庫が一定水準（発注点）を下回った時点で発注する方式。" },
  { id: 954, cat: "用語集", q: "Perpetual Inventory（永久棚卸法/常時棚卸）とは？", a: "入出庫の都度、在庫記録をリアルタイムに更新する在庫管理方式。" },
  { id: 955, cat: "用語集", q: "Physical Inventory（実地棚卸）とは？", a: "実際に現物を数えて在庫数量を確認する棚卸作業。" },
  { id: 956, cat: "用語集", q: "Inventory Shrinkage（在庫ロス）とは？", a: "盗難・破損・記録誤りなどにより生じる、帳簿在庫と実在庫の差異。" },
  { id: 957, cat: "用語集", q: "Obsolete Inventory（不動在庫/陳腐化在庫）とは？", a: "需要が見込めなくなった在庫。" },
  { id: 958, cat: "用語集", q: "Engineer-to-Order（ETO）とは？", a: "受注後に設計から始める生産方式。個別性の高い製品向け。" },
  { id: 959, cat: "用語集", q: "Make-to-Order（MTO）とは？", a: "実際の受注をトリガーに製造を開始する生産方式。" },
  { id: 960, cat: "用語集", q: "Make-to-Stock（MTS）とは？", a: "需要予測に基づき見込みで生産し、完成品在庫を保持する生産方式。" },
  { id: 961, cat: "用語集", q: "Assemble-to-Order（ATO）とは？", a: "受注後に標準部品・サブアセンブリを組み合わせて最終製品を組み立てる生産方式。" },
  { id: 962, cat: "用語集", q: "Configure-to-Order（CTO）とは？", a: "受注後に顧客仕様に応じて構成・パッケージングを行う生産方式。" },
  { id: 963, cat: "用語集", q: "Cellular Manufacturing（セル生産方式）とは？", a: "製品や部品ファミリーごとに機械・工程を近接配置し、小ロット・連続フローの生産を実現する方式。" },
  { id: 964, cat: "用語集", q: "Takt Time（タクトタイム）とは？", a: "需要を満たすために1単位を生産すべき最大許容時間。顧客需要と生産ペースを同期させる指標。" },
  { id: 965, cat: "用語集", q: "Kaizen（改善）とは？", a: "「変化」と「良い」を組み合わせた言葉で、品質・コスト・納期などを継続的に改善していく活動・思想。" },
  { id: 966, cat: "用語集", q: "Poka-Yoke（ポカヨケ）とは？", a: "作業ミスを未然に防ぐ、またはミスが起きた際に即座に気づける仕組み・工夫。" },
  { id: 967, cat: "用語集", q: "Andon（アンドン）とは？", a: "品質・工程の異常を、信号灯や表示によって現場全体に知らせる仕組み。" },
  { id: 968, cat: "用語集", q: "Heijunka（平準化）とは？", a: "生産量・生産順序のばらつきを平均化し、安定した生産フローを実現する手法。" },
  { id: 969, cat: "用語集", q: "Single Minute Exchange of Dies（SMED）とは？", a: "生産ラインの段取り替え時間を大幅に短縮する手法。" },
  { id: 970, cat: "用語集", q: "Muda（ムダ）とは？", a: "顧客価値を生まない無駄な活動・工程。" },
  { id: 971, cat: "用語集", q: "Mura（ムラ）とは？", a: "作業量や工程の負荷にばらつき・不均一があること。" },
  { id: 972, cat: "用語集", q: "Muri（ムリ）とは？", a: "人や設備に過度な負荷・無理をかけること。" },
  { id: 973, cat: "用語集", q: "5S（整理・整頓・清掃・清潔・躾）とは？", a: "作業現場を整理整頓し維持するための5つの活動指針。Sort/Set in Order/Shine/Standardize/Sustainの頭文字。" },
  { id: 974, cat: "用語集", q: "Six Sigma（シックスシグマ）とは？", a: "100万機会あたりの欠陥数を3.4件以下に抑えることを目標とする、統計的品質改善手法。" },
  { id: 975, cat: "用語集", q: "DMAIC（ディーマイク）とは？", a: "Six Sigmaの改善手順。Define, Measure, Analyze, Improve, Controlの頭文字。" },
  { id: 976, cat: "用語集", q: "Statistical Process Control（統計的工程管理, SPC）とは？", a: "工程のばらつきを統計的に監視し、管理限界内に収まっているかを確認する品質管理手法。" },
  { id: 977, cat: "用語集", q: "Drum-Buffer-Rope（DBR）とは？", a: "制約理論（TOC）に基づく生産管理手法。ボトルネック（ドラム）のペースに合わせ、バッファで保護し、ロープで工程を同期させる。" },
  { id: 978, cat: "用語集", q: "Overall Equipment Effectiveness（総合設備効率, OEE）とは？", a: "設備の可動率・性能・良品率を掛け合わせた、設備総合効率を示す指標。" },
  { id: 979, cat: "用語集", q: "Acceptable Quality Level（合格品質水準, AQL）とは？", a: "抜き取り検査において許容される不良の最大水準。" },
  { id: 980, cat: "用語集", q: "Quality Function Deployment（品質機能展開, QFD）とは？", a: "顧客要求を設計・製造の技術要件に体系的に変換する手法。" },
  { id: 981, cat: "用語集", q: "Root Cause Analysis（根本原因分析）とは？", a: "問題の表面的な症状ではなく、根本的な原因を特定するための分析手法。" },
  { id: 982, cat: "用語集", q: "Corrective Action（是正措置）とは？", a: "発生した不適合の原因を除去し、再発を防止するための処置。" },
  { id: 983, cat: "用語集", q: "Time Fence（タイムフェンス）とは？", a: "計画変更を許可する境界となる、現在時点からの一定期間の区切り。" },
  { id: 984, cat: "用語集", q: "Firm Planned Order（確定計画オーダー）とは？", a: "システムによる自動変更の対象から外され、計画者が確定させた計画発注。" },
  { id: 985, cat: "用語集", q: "Planning Bill of Material（計画部品表）とは？", a: "製品ファミリーの需要予測を個別製品に配分するために使う仮想的な部品表。" },
  { id: 986, cat: "用語集", q: "Phantom Bill of Material（ファントム部品表）とは？", a: "在庫として保管されず、上位品目の計画にそのまま溶け込む部品構成。" },
  { id: 987, cat: "用語集", q: "Aggregate Planning（アグリゲート・プランニング）とは？", a: "需要と供給資源を集約レベルでバランスさせる中期計画。" },
  { id: 988, cat: "用語集", q: "Bottleneck（ボトルネック）とは？", a: "生産プロセス全体のスループットを制約する、能力が最も低い工程・資源。" },
  { id: 989, cat: "用語集", q: "Capacity Utilization（稼働率）とは？", a: "利用可能な生産能力に対する、実際に使用された能力の割合。" },
  { id: 990, cat: "用語集", q: "Changeover Time（段取り替え時間）とは？", a: "生産ラインで製品を切り替える際にかかる準備時間。" },
  { id: 991, cat: "用語集", q: "Work-in-Process（仕掛品, WIP）とは？", a: "製造工程の途中段階にある、未完成の在庫。" },
  { id: 992, cat: "用語集", q: "Request for Quotation（見積依頼書, RFQ）とは？", a: "価格・納期などの見積もりをサプライヤーに依頼する文書。" },
  { id: 993, cat: "用語集", q: "Request for Proposal（提案依頼書, RFP）とは？", a: "要件を提示し、サプライヤーからの提案を募る文書。" },
  { id: 994, cat: "用語集", q: "Request for Information（情報提供依頼書, RFI）とは？", a: "正式な見積もり依頼の前段階として、サプライヤーの情報を収集するための文書。" },
  { id: 995, cat: "用語集", q: "Blanket Purchase Order（包括発注）とは？", a: "一定期間にわたる複数回の納品条件をまとめて取り決める発注方式。都度の発注事務を簡略化する。" },
  { id: 996, cat: "用語集", q: "Strategic Sourcing（戦略的調達）とは？", a: "長期的な調達要件を分析し、供給先選定・契約交渉・実績管理までを体系的に行う調達プロセス。" },
  { id: 997, cat: "用語集", q: "Reverse Auction（リバースオークション）とは？", a: "複数のサプライヤーが1つの発注に対して競り下げ方式で入札する調達手法。" },
  { id: 998, cat: "用語集", q: "Supplier Scorecard（サプライヤー・スコアカード）とは？", a: "納期・品質・コストなど複数指標でサプライヤーの実績を評価する仕組み。" },
  { id: 999, cat: "用語集", q: "Single Sourcing（単一調達）とは？", a: "特定の部品・サービスを1社のみから調達する方針。" },
  { id: 1000, cat: "用語集", q: "Dual Sourcing（デュアルソーシング）とは？", a: "供給リスクを分散するため、同一部品を複数のサプライヤーから調達する方針。" },
  { id: 1001, cat: "用語集", q: "Approved Vendor List（承認済みサプライヤーリスト, AVL）とは？", a: "技術・財務・実績等の基準を満たし、取引が認められたサプライヤーの一覧。" },
  { id: 1002, cat: "用語集", q: "Spend Analysis（支出分析）とは？", a: "購買データを分析し、コスト削減や調達戦略立案に活用する取り組み。" },
  { id: 1003, cat: "用語集", q: "Cost of Goods Sold（売上原価, COGS）とは？", a: "一定期間に販売された製品の製造・仕入れにかかった直接費用の総額。" },
  { id: 1004, cat: "用語集", q: "Landed Cost（着地コスト）とは？", a: "商品コストに加え、輸送・保険・関税・保管などを含めた総コスト。" },
  { id: 1005, cat: "用語集", q: "Activity-Based Costing（活動基準原価計算, ABC原価計算）とは？", a: "コストを活動単位で捕捉し、その活動を消費する製品・サービスに配賦する原価計算手法。" },
  { id: 1006, cat: "用語集", q: "Days Sales Outstanding（売上債権回転日数, DSO）とは？", a: "売上計上から実際に代金を回収するまでの平均日数。" },
  { id: 1007, cat: "用語集", q: "Days Payable Outstanding（買掛金支払日数, DPO）とは？", a: "仕入計上から実際に代金を支払うまでの平均日数。" },
  { id: 1008, cat: "用語集", q: "Fixed Cost（固定費）とは？", a: "生産量や販売量に関わらず一定に発生する費用。" },
  { id: 1009, cat: "用語集", q: "Variable Cost（変動費）とは？", a: "生産量・活動量に応じて増減する費用。" },
  { id: 1010, cat: "用語集", q: "Total Cost Analysis（総コスト分析）とは？", a: "輸送・保管・在庫・顧客サービスなど複数のコスト要素を総合的に評価し、最適な意思決定を行う考え方。" },
  { id: 1011, cat: "用語集", q: "Aggregate Forecast（集約予測）とは？", a: "個別製品ではなく、製品ファミリーや地域などまとめた単位で行う需要予測。" },
  { id: 1012, cat: "用語集", q: "Consuming the Forecast（予測の消化）とは？", a: "実際の受注が入るにつれて、その分だけ予測需要を差し引いていく実務処理。" },
  { id: 1013, cat: "用語集", q: "Demand Sensing（デマンドセンシング）とは？", a: "POSデータなど直近の実需情報を活用し、短期需要変動をいち早く捉える手法。" },
  { id: 1014, cat: "用語集", q: "Collaborative Forecasting（協働的予測）とは？", a: "サプライチェーンパートナー間で情報を共有しながら共同で需要予測を行う取り組み。" },
  { id: 1015, cat: "用語集", q: "Fill Rate（充足率）とは？", a: "注文された数量のうち、実際に即納できた数量の割合を示す指標。" },
  { id: 1016, cat: "用語集", q: "Order Fulfillment Lead Time（受注充足リードタイム）とは？", a: "顧客が注文してから納品を受け取るまでの平均時間。" },
  { id: 1017, cat: "用語集", q: "On-Time Delivery（納期遵守率）とは？", a: "約束した納期通りに納品できた注文の割合。" },
  { id: 1018, cat: "用語集", q: "Cycle Time（サイクルタイム）とは？", a: "ある業務プロセスの開始から完了までに要する時間。" },
  { id: 1019, cat: "用語集", q: "Inventory Accuracy（在庫精度）とは？", a: "帳簿在庫と実在庫が一致している度合いを示す指標。" },
  { id: 1020, cat: "用語集", q: "Case Fill Rate（ケース充足率）とは？", a: "注文されたケース数のうち、実際に即納できたケース数の割合。" },
  { id: 1021, cat: "用語集", q: "Line Fill Rate（ライン充足率）とは？", a: "注文明細行（オーダーライン）のうち、完全に充足できた行の割合。" },
  { id: 1022, cat: "用語集", q: "Electronic Data Interchange（電子データ交換, EDI）とは？", a: "企業間の商取引文書を標準化されたフォーマットでコンピュータ間で電子的にやり取りする仕組み。" },
  { id: 1023, cat: "用語集", q: "Advance Shipping Notice（事前出荷通知, ASN）とは？", a: "出荷内容の詳細を、実際の到着前に荷受人へ電子的に通知する文書。" },
  { id: 1024, cat: "用語集", q: "Radio Frequency Identification（RFID）とは？", a: "電波を用いてタグの情報を非接触で読み取る自動認識技術。" },
  { id: 1025, cat: "用語集", q: "Global Trade Item Number（GTIN）とは？", a: "商品・サービスを一意に識別するための国際標準コード。" },
  { id: 1026, cat: "用語集", q: "Serial Shipping Container Code（SSCC）とは？", a: "出荷単位（パレットや梱包）を一意に識別する18桁のコード。" },
  { id: 1027, cat: "用語集", q: "Barcode（バーコード）とは？", a: "太さの異なる線の組み合わせで数値・英数字情報を表す、光学的に読み取り可能な識別コード。" },
  { id: 1028, cat: "用語集", q: "Vertical Integration（垂直統合）とは？", a: "自社で上流（原材料・部品）や下流（流通・販売）の機能まで担う経営戦略。" },
  { id: 1029, cat: "用語集", q: "Outsourcing（アウトソーシング）とは？", a: "自社の業務・機能を外部の専門業者に委託すること。" },
  { id: 1030, cat: "用語集", q: "Offshoring（オフショアリング）とは？", a: "生産・業務機能を海外に移管すること。" },
  { id: 1031, cat: "用語集", q: "Nearshoring（ニアショアリング）とは？", a: "生産・業務機能を、自国から地理的に近い国へ移管すること。" },
  { id: 1032, cat: "用語集", q: "Reshoring（リショアリング）とは？", a: "海外に移管していた生産・業務機能を自国内に戻すこと。" },
  { id: 1033, cat: "用語集", q: "Business Continuity Planning（事業継続計画, BCP）とは？", a: "災害・障害発生時にも重要業務を継続・早期復旧させるための計画。" },
  { id: 1034, cat: "用語集", q: "Risk Pooling（リスクプーリング）とは？", a: "複数拠点の需要変動を集約することで、全体の変動を相対的に縮小させる効果・考え方。" },
  { id: 1035, cat: "用語集", q: "Service Level Agreement（サービス品質保証契約, SLA）とは？", a: "サービス提供者と利用者間で合意される、達成すべきサービス水準を定めた契約。" },
  { id: 1036, cat: "用語集", q: "Statement of Work（作業範囲記述書, SOW）とは？", a: "契約における作業内容・成果物・スケジュールなどを詳細に定めた文書。" },
  { id: 1037, cat: "用語集", q: "Force Majeure（不可抗力条項）とは？", a: "天災・戦争など当事者の制御が及ばない事由による契約不履行の責任を免除する条項。" },
  { id: 1038, cat: "用語集", q: "Reverse Logistics（リバースロジスティクス）とは？", a: "返品・回収・リサイクルなど、消費者から生産者に向かう逆方向の物流プロセス。" },
  { id: 1039, cat: "用語集", q: "Carbon Footprint（カーボンフットプリント）とは？", a: "ある活動・製品によって排出される温室効果ガスの総量。" },
  { id: 1040, cat: "用語集", q: "Circular Supply Chain（循環型サプライチェーン）とは？", a: "廃棄を最小化し、資源の再利用・再生を前提に設計されたサプライチェーン。" },
  { id: 1041, cat: "用語集", q: "Integrated Business Planning（統合ビジネスプランニング, IBP）とは？", a: "S&OPをさらに発展させ、財務計画や事業戦略全体と統合した計画プロセス。" },
  { id: 1042, cat: "用語集", q: "Total Quality Management（総合的品質管理, TQM）とは？", a: "組織全体で継続的な品質改善に取り組む経営手法。" },
  { id: 1043, cat: "用語集", q: "Benchmarking（ベンチマーキング）とは？", a: "自社のプロセスや実績を、業界最良の事例と比較し改善点を見出す手法。" },
  { id: 1044, cat: "用語集", q: "Core Competency（コアコンピタンス）とは？", a: "他社が模倣困難な、企業の中核的な強み・能力。" },
  { id: 1045, cat: "用語集", q: "Value Chain（バリューチェーン）とは？", a: "原材料調達から製品・サービスが顧客に届くまでの一連の価値創造活動。" },
  { id: 1046, cat: "用語集", q: "SWOT Analysis（SWOT分析）とは？", a: "強み（Strengths）・弱み（Weaknesses）・機会（Opportunities）・脅威（Threats）を整理する戦略分析フレームワーク。" },
  { id: 1047, cat: "用語集", q: "Backorder（バックオーダー、未出荷残）とは？", a: "在庫不足により、注文の一部または全部がすぐに出荷できず、後日出荷予定として保留されている状態。" },
  { id: 1048, cat: "用語集", q: "Stockout（欠品）とは？", a: "在庫がゼロになり、注文や需要に応じられない状態。" },
  { id: 1049, cat: "用語集", q: "Lead Time（リードタイム）とは？", a: "発注してから実際に納品・利用可能になるまでに要する時間。" },
  { id: 1050, cat: "用語集", q: "Throughput（スループット）とは？", a: "一定期間内にシステム・工程を通過して産出される量。" },
  { id: 1051, cat: "用語集", q: "Bullwhip Effect（ブルウィップ効果）の別名は？", a: "「Whiplash Effect」とも呼ばれる。J. Forresterの研究に由来するため「Forrester Effect」とも呼ばれる。" },

  // SCM実践理論（Fundamentals of Supply Chain Management, Dawei Lu / bookboon.com より）
  { id: 1100, cat: "SCM実践理論", q: "「サプライチェーンマネジメント」という用語が初めて登場したのはいつ、どの媒体か？", a: "1982年、Financial Times紙に掲載されたOliverとWebberの記事で初めて使われ、企業が調達・供給を管理する一連の活動を指す言葉として紹介された。" },
  { id: 1101, cat: "SCM実践理論", q: "1980年代と1990年代でサプライチェーンマネジメントの研究の焦点はどう変化したか？", a: "1980年代は購買活動やコスト削減が中心だったが、1990年代にサプライチェーン統合やサプライヤー・バイヤー関係の研究が急増し、現在の概念が確立していった。" },
  { id: 1102, cat: "SCM実践理論", q: "サプライチェーンマネジメントが今日の企業経営に必要とされる背景要因を挙げよ。", a: "グローバル化の進展、競争の激化、顧客期待の高まり、技術の影響、地政学的要因などにより、自社単独の経営では十分な競争力を発揮できなくなったこと。" },
  { id: 1103, cat: "SCM実践理論", q: "現代の競争構造の変化を一言で表す考え方は何か？", a: "競争の主体が「企業対企業」から「サプライチェーン対サプライチェーン」へと移行しているという考え方。" },
  { id: 1104, cat: "SCM実践理論", q: "サプライチェーンが成立するための必要条件を挙げよ。", a: "2社以上の法的に独立した企業が、価値を付加する共通の物材流に対するコミットメントによって相互に連結していること。" },
  { id: 1105, cat: "SCM実践理論", q: "サプライチェーンにおける「フォーカルカンパニー」とは何か？", a: "サプライチェーンの中心に位置する完成品メーカーで、OEM（相手先ブランド製造）やOBM（自社ブランド製造）として言及されることもある企業。" },
  { id: 1106, cat: "SCM実践理論", q: "サプライチェーンを「チェーン」ではなく「ネットワーク」と捉えるべき理由は何か？", a: "現実には各企業が複数のサプライヤーと複数の顧客を持ち、さらにチェーンの中に入れ子状の別チェーン（例：自動車チェーン内のエンジン製造チェーン）が存在するため。" },
  { id: 1107, cat: "SCM実践理論", q: "サプライチェーンを価値付加活動の連鎖として捉えた場合の別名、および需要の連鎖として捉えた場合の別名は何か？", a: "前者は「バリューチェーン」、後者は「デマンドチェーン」と呼ばれる。" },
  { id: 1108, cat: "SCM実践理論", q: "サプライチェーンの境界を定義する4つの本質的なフローを挙げよ。", a: "物材流（マテリアルフロー）、情報流（インフォメーションフロー）、資金流（ファイナンスフロー）、商流（コマーシャルフロー）の4つ。" },
  { id: 1109, cat: "SCM実践理論", q: "サプライチェーンにおける資金流（ファイナンスフロー）の特徴は何か？", a: "サプライチェーン全体の資金源は最終消費者ただ一つであり、この「単一の資金源」という視点がサプライチェーンを一つの実体（シングルエンティティ）として捉える考え方の基礎となる。" },
  { id: 1110, cat: "SCM実践理論", q: "商流（コマーシャルフロー）が成立する条件は何か？", a: "物材が供給者から購入者へと繰り返し所有権を移転すること。単一組織内の物材移動には所有権変更が伴わないため商流は発生しない。" },
  { id: 1111, cat: "SCM実践理論", q: "著者が最終消費者をサプライチェーンの構成員に含めないと主張する根拠を挙げよ。", a: "消費者は供給せず需要するだけであること、消費者は価値を付加せず消費して市場価値を減じること、供給連鎖は専門特化しているが消費者の購買行動は多様であることの3点。" },
  { id: 1112, cat: "SCM実践理論", q: "サプライチェーンマネジメントを構成する3つの概念的要素は何か？", a: "サプライチェーン・コンフィギュレーション（構成）、サプライチェーン・リレーションシップ（関係性）、サプライチェーン・コーディネーション（調整）の3つ。" },
  { id: 1113, cat: "SCM実践理論", q: "サプライチェーン・コンフィギュレーションとは何を扱う意思決定領域か？", a: "OEMのサプライヤー基盤の規模、垂直統合の範囲、アウトソーシングの程度、下流の流通チャネル設計など、サプライチェーンの構造（アーキテクチャ）に関する戦略的意思決定。" },
  { id: 1114, cat: "SCM実践理論", q: "サプライチェーン・リレーションシップにおける「アームズ・レングス」関係とはどのようなものか？", a: "取引の数量と価格のみを交換する希薄な関係のことで、ビジョンや投資計画、新製品開発情報まで共有する密接なパートナーシップとは対照的な関係性。" },
  { id: 1115, cat: "SCM実践理論", q: "グローバルサプライチェーンが認識すべき5つの主要特性を挙げよ。", a: "ボーダーレス（国境の制約低下）、サイバー・コネクテッド（デジタル接続）、規制緩和（Deregulated）、環境意識（Environmental Consciousness）、社会的責任（Social Responsibility）の5つ。" },
  { id: 1116, cat: "SCM実践理論", q: "世界的な市場収斂（グローバル・マーケット・コンバージェンス）とは何か、また何がそれを促したか？", a: "各国固有の市場が類似の製品・サービスへと収斂していく傾向のことで、インターネットやテレビなど世界的マスメディアの発達、およびBRICs（ブラジル・ロシア・インド・中国）の経済的台頭によって促進された。" },
  { id: 1117, cat: "SCM実践理論", q: "アダムスミスの「分業の理論」がグローバルサプライチェーンの優位性をどう説明するか？", a: "グローバルサプライチェーンは国際的な分業の利益を活用できるため、ローカルなサプライチェーンより高い経済効率を実現できるとされる。" },
  { id: 1118, cat: "SCM実践理論", q: "グローバルサプライチェーンが直面する4つの戦略的課題の次元を挙げよ。", a: "市場（マーケット）次元、技術（テクノロジー）次元、資源（リソース）次元、時間（タイム）次元の4つ。" },
  { id: 1119, cat: "SCM実践理論", q: "クレイトン・クリステンセンが提唱した「破壊的技術（disruptive technology）」の概念とは何か？", a: "新技術が既存の優良企業を失敗に追い込む現象を指し、著書『イノベーターのジレンマ』（1997年）で提示された。新技術は必ずしも持続的でなく、既存の能力を破壊する場合があるとする考え方。" },
  { id: 1120, cat: "SCM実践理論", q: "技術破壊の産業レベルでの具体例を挙げよ。", a: "デジタル写真技術がフィルム製造業を破壊し、LCD・プラズマ技術がブラウン管（TV Tube）製造業を一気に衰退させた例。" },
  { id: 1121, cat: "SCM実践理論", q: "トヨタが顧客リードタイムの短さで示している業界最短記録はどのようなものか？", a: "顧客仕様の車両をわずか2週間（a fortnight）で生産できると主張しており、これが自動車業界で最短のリードタイムとされる。" },
  { id: 1122, cat: "SCM実践理論", q: "サプライチェーンにおける協働（コラボレーション）が有効とされる理由を4つ挙げよ。", a: "資源の共有（重複投資の回避）、シナジーの創出、リスクの分担、イノベーションの促進の4つ。" },
  { id: 1123, cat: "SCM実践理論", q: "コラボレーションにおける「シナジー」とはどのような概念か？", a: "2つ以上の要素が組み合わさることで、それぞれが単独で得られる結果の算術的合計（A+B）よりも大きな成果を生み出すこと。" },
  { id: 1124, cat: "SCM実践理論", q: "FrohlichとWestbrook（2001年）が提唱した「統合の弧（Arc of Integration）」とは何か？", a: "サプライチェーンがどの程度統合されているかを図示する概念で、弧が広いほどより広範囲のサプライチェーンにわたる高い統合度を表す。" },
  { id: 1125, cat: "SCM実践理論", q: "よく統合されたサプライチェーンが示す典型的な特徴を挙げよ。", a: "高い可視性、低い在庫水準、高い稼働率、短いリードタイム、高い製品品質（低い不良率）。" },
  { id: 1126, cat: "SCM実践理論", q: "「多角的な製品ポートフォリオ（divergent product portfolio）」戦略の狙いは何か？", a: "グローバル市場の変動性・多様性に対応するため製品ラインを分散させ、一部の製品が不振でも他の製品で業績を安定させる、リスク緩和のショックアブソーバーとして機能させること。" },
  { id: 1127, cat: "SCM実践理論", q: "ブルーオーシャン戦略とは何か、誰が提唱したか？", a: "KimとMauborgneが2005年の共著『ブルーオーシャン戦略』で提唱した概念で、既存の競争が激しい「レッドオーシャン」で戦うのではなく、競争のない新市場「ブルーオーシャン」を創造することで競争そのものを無意味にする戦略。" },
  { id: 1128, cat: "SCM実践理論", q: "世界クラス（world class）のサプライチェーンが卓越すべき4つの次元を挙げよ。", a: "オペレーショナル・エクセレンス（業務の卓越性）、戦略的適合性、環境適応能力、そして独自の実践から生まれる「ユニークボイス」の4つ。" },
  { id: 1129, cat: "SCM実践理論", q: "PRTM調査（2010年）が示すグローバルSCMの現在のトレンドを挙げよ。", a: "需要変動と市場不確実性の増大、グローバルな顧客・サプライヤーネットワークへの依存拡大、コスト最適化されたサプライチェーン構成への移行、リスク管理のエンドツーエンド化、サプライチェーン統合と権限委譲の重視、の5トレンド。" },
  { id: 1130, cat: "SCM実践理論", q: "調査で指摘された「隠れたコスト」への対応策として挙げられている総合的コスト管理手法は何か？", a: "Total Supply Chain Cost Engineering（サプライチェーン総コストエンジニアリング）と呼ばれる、注文管理から調達・製造・物流に至る全プロセスの総コストを算定・管理する統合的アプローチ。" },
  { id: 1131, cat: "SCM実践理論", q: "サプライチェーン構成（Supply Chain Configuration）とは何か？", a: "サプライヤーの数や階層化、地理的立地、所有・独立性、流通チャネルの選択など、チェーンに参加する企業同士がどのように結びついて顧客に製品・サービスを届けるかを表す設計要素。業界や市場環境、製品ライフサイクルによって最適な形は異なり、唯一の「正解」構成は存在しない。" },
  { id: 1132, cat: "SCM実践理論", q: "サプライチェーン設計・計画の主要な検討項目を4つ以上挙げよ。", a: "サプライチェーン構成、垂直統合の程度、戦略的アウトソーシング、立地決定、キャパシティ計画、ブルウィップ効果への対処など。" },
  { id: 1133, cat: "SCM実践理論", q: "戦後の欧州系多国籍企業（Unilever、Royal Dutch/Shell、ICI、Philipsなど）が採用したサプライチェーン構成の特徴は？", a: "各国の子会社に高い独立性を持たせ、自国での製品開発・製造・マーケティングを任せる『疎結合（semidetached）』な構成。当時の国際輸送・通信が遅く不安定で、各国市場の差異が大きかったことへの対応だった。" },
  { id: 1134, cat: "SCM実践理論", q: "1950～60年代の米国系多国籍企業（GM、Ford、IBMなど）のサプライチェーン構成の特徴は？", a: "子会社に一定の自律性を与えつつも、米国本社が戦略指導・資源供給の面で主導的地位を占める構成。当時米国が世界最大の市場であり、新製品・技術の供給源だったため。" },
  { id: 1135, cat: "SCM実践理論", q: "1970～80年代の日本系多国籍企業（トヨタ、ホンダ、松下、NEC、ソニーなど）のサプライチェーン構成の特徴は？", a: "国内の集中拠点を起点にグローバル戦略を推進する構成。海外子会社は当初、販売・流通・顧客サポートを担うのみで、大規模工場を国内に築くことで規模と経験による優位性を獲得した。" },
  { id: 1136, cat: "SCM実践理論", q: "ネットワーク関係の観点から見た「Stable Network（安定型ネットワーク）」とは？", a: "OEMが中長期的に安定した階層化サプライヤー・ディストリビューターと関係を築くサプライチェーン構成。ダイナミック型に比べ、供給業者・流通業者の業務に対する統制力が高い。" },
  { id: 1137, cat: "SCM実践理論", q: "ネットワーク関係の観点から見た「Dynamic Network（動的ネットワーク）」とは？", a: "OEMが長期的な階層取引先を多く持たず、動的かつ短期的なサプライヤー・ディストリビューターを活用して高い操業の柔軟性と戦略的機敏性を追求する構成。誤解が生じると回復不能な製品欠陥につながるリスクがある一方、需要変化への対応や技術革新に強い。" },
  { id: 1138, cat: "SCM実践理論", q: "垂直統合（Vertical Integration）とは何か？", a: "サプライチェーン上の連続する複数の活動を単一の企業が所有すること。サプライチェーン統合（供給連携の緊密さ）とは別概念であり、統合度の高いサプライチェーンが必ずしも垂直統合の範囲が広いとは限らない。" },
  { id: 1139, cat: "SCM実践理論", q: "1930年代のフォード・モーターが行った極端な垂直統合の目的は何だったとされるか？", a: "独立サプライヤーに頼らず製鉄所やガラス工場、ゴム農園まで自社保有することで、統制の確保・上流サプライヤーからの利益の獲得・市場支配力の獲得を狙ったため。" },
  { id: 1140, cat: "SCM実践理論", q: "フォードの極端な垂直統合戦略が抱えた弱点は何か？", a: "資産配置や製品ラインの変更に硬直的で、生産能力が固定されていたため需要変化への対応に柔軟性を欠いた点。" },
  { id: 1141, cat: "SCM実践理論", q: "GMがフォードと対照的に採用した垂直統合戦略は何か？", a: "独立サプライヤーを積極的に活用しつつ、垂直統合部分の中にも戦略的利益単位（strategic profit unit）を設けて競争力を維持する、垂直統合の程度を抑えた『フルライン製品』戦略。多様な車種展開により顧客の多様なニーズに応え、フォードを追い越して世界最大の自動車メーカーとなった。" },
  { id: 1142, cat: "SCM実践理論", q: "業界特性と垂直統合の程度の一般的な関係は？", a: "石油・化学産業のようなプロセス型産業ほど垂直統合の程度が高くなりやすく、電子機器産業のような技術集約型産業ほど垂直統合の程度は低くなりやすい。" },
  { id: 1143, cat: "SCM実践理論", q: "アウトソーシング（戦略的アウトソーシング）とは何か？", a: "設計・製造・マーケティングなど自社内で行っていた業務のうち、戦略的に重要な業務を外部の独立サプライヤーに委託する意思決定・プロセスのこと。いわゆる『内製か購入か（make-or-buy）』の意思決定にあたる。" },
  { id: 1144, cat: "SCM実践理論", q: "アウトソーシングの定義における2つの重要なポイントは何か？", a: "①単なる内製・購入の判断だけでなく、供給候補の特定・契約交渉・定期評価まで含むプロセスであること。②外部委託される業務すべてがアウトソーシングと呼べるわけではなく、戦略的に重要な業務のみがアウトソーシングに分類されること。" },
  { id: 1145, cat: "SCM実践理論", q: "アウトソーシングがもたらすとされる主な便益を3つ以上挙げよ。", a: "コア・コンピタンスへの集中と強化、競争優位の差別化、事業・サプライチェーンの柔軟性向上、サプライチェーンの応答性向上、集中投資による参入障壁の構築、固定資産圧縮によるROI・ROEの向上など。" },
  { id: 1146, cat: "SCM実践理論", q: "オフショアリング（Offshoring）とは何か？", a: "現地資源の活用や運営コスト削減、市場プレゼンス確立のために、自国内の業務を海外拠点へ移転すること。移転先の所有権が自社に残る場合はアウトソーシングには当たらない点で、アウトソーシングとは異なる概念。" },
  { id: 1147, cat: "SCM実践理論", q: "アウトソーシング業務の3つの大分類を挙げよ。", a: "ビジネスプロセス・アウトソーシング（BPO：マーケティング/コールセンター、研究開発、エンジニアリング、人事、ナレッジプロセスなど）、ビジネス機能アウトソーシング（財務監査、IT、物流など）、施設・人材アウトソーシング（設備リース、専門人材派遣など）。" },
  { id: 1148, cat: "SCM実践理論", q: "アウトソーシングの意思決定プロセスにおける典型的なステップを挙げよ。", a: "競争環境の理解、戦略目標とプロセスの明確化、市場ニーズの分析、内部資源・能力の特定、内製か購入かの意思決定、戦略的サプライヤーの特定、関係性の決定、実施後の評価とレビュー、という一連のステップ。" },
  { id: 1149, cat: "SCM実践理論", q: "アウトソーシングに伴うリスクを3つ以上挙げよ。", a: "従業員への悪影響、重要な戦略設計業務の統制喪失による競争力低下、将来の競合を生み出す可能性、単一供給元の障害による事業中断リスク、短期志向による継続的改善・長期投資の阻害、知的財産権リスク、海外サプライヤー関与時の為替リスクなど。" },
  { id: 1150, cat: "SCM実践理論", q: "サプライチェーンの立地決定（Location Decisions）の目的は何か？", a: "顧客へのサービス向上とサプライチェーン運営コストの削減。立地は労務費・原材料費・税制・為替リスク・法規制などに大きな影響を与える強力な経営手段となる。" },
  { id: 1151, cat: "SCM実践理論", q: "サプライチェーン総コストを構成する2つの要素は何か？", a: "物理的コスト（physical cost：生産・物流・原材料・労務・税・エネルギーなど、原材料を最終製品に変換するのに必要な効率性のコスト）と、市場コスト（market cost：適切な数量・場所・品質・価格で製品を届けられなかった場合に生じる、製品配送プロセス（PDP）に関わる損失コスト）。" },
  { id: 1152, cat: "SCM実践理論", q: "立地決定における加重スコアリング法（weighted scoring method）の手順を挙げよ。", a: "①評価基準の特定、②各基準への重要度の割当（合計が100になるよう重み付け）、③各候補地を基準ごとに一定の尺度で採点、④各基準の重みと得点を掛け合わせて合計し、総合得点が最も高い立地を選定する、という4ステップ。" },
  { id: 1153, cat: "SCM実践理論", q: "単一系列（一本の連鎖）のサプライチェーンにおける全体キャパシティは、各メンバーの個別キャパシティからどう決まるか？", a: "参加メンバーそれぞれの既知のキャパシティのうち、最小値によって決まる（水道管の最も細い断面が全体の流量を決めるのと同じ原理）。" },
  { id: 1154, cat: "SCM実践理論", q: "サプライチェーンのキャパシティ計画に応用される、ボトルネック解消の理論的枠組みは何か？", a: "制約理論（Theory of Constraints）。ボトルネックとなっている箇所を特定して開放することが要点であり、ボトルネックでない箇所への対策は全体キャパシティに影響しないため無意味とされる。ボトルネックを解消すると次に小さいキャパシティの箇所が新たなボトルネックになる。" },
  { id: 1155, cat: "SCM実践理論", q: "サプライチェーンのキャパシティ計画を構成する3つのレベルを挙げよ。", a: "①企業内部のキャパシティ調整・管理（内部サプライチェーン管理）、②サプライチェーン内の他メンバーとの外部キャパシティ調整・同期、③市場需要変化に対するサプライチェーン全体の応答性（需要とのキャパシティ同期）。" },
  { id: 1156, cat: "SCM実践理論", q: "ブルウィップ効果の3つの主要な特徴を挙げよ。", a: "①振動（oscillation：需要・注文・在庫が上下を繰り返す）、②増幅（amplification：上流に向かうほど変動の大きさが拡大する）、③位相遅れ（phase lag：ピーク・トラフの周期が前段階よりも遅れて現れる）。" },
  { id: 1157, cat: "SCM実践理論", q: "ビール・ゲーム（Beer Game）とは何か？", a: "MITスローン経営大学院がJay Forresterの研究をもとに開発した、ブルウィップ効果を体験的に学ぶロールプレイ型シミュレーションゲーム。小売・卸売・流通・工場の4区分から成るサプライチェーンを模し、需要のわずかな変化がプレイヤーの発注行動を通じて大きな振動・増幅・在庫過不足を引き起こすことを示す。" },
  { id: 1158, cat: "SCM実践理論", q: "ビール・ゲームにおいて発注や配送の遅延に加え、在庫の乱高下を引き起こす主な原因は何か？", a: "発注から受領までの処理・出荷の遅延と、その遅延の存在にもかかわらずプレイヤーが在庫を素早く調整できないこと（バックログの発生と、それに対する過剰・過小反応）。" },
  { id: 1159, cat: "SCM実践理論", q: "実際のサプライチェーン運用でブルウィップ効果を悪化させる追加的要因を挙げよ。", a: "ロットまとめ発注（バッチング）、設備故障、保守不良、不適切なスケジューリングや情報伝達、キャパシティ調整の不備、市場の混乱など。" },
  { id: 1160, cat: "SCM実践理論", q: "購買（Purchasing）機能の古典的定義とは？", a: "適切な品質・数量の資材やサービスを、適切な供給元から、適切な場所・価格で調達すること（いわゆる「ライトの5原則」）。" },
  { id: 1161, cat: "SCM実践理論", q: "購買機能が利益に大きなレバレッジ効果を持つのはなぜか？", a: "売上原価に占める購入資材・サービス費の割合が大きいため、購買コストをわずかに削減するだけで（例：7%削減）、利益率を大きく（例：100%）押し上げられるから。" },
  { id: 1162, cat: "SCM実践理論", q: "クラリッチ購買ポートフォリオ（Kraljic Purchasing Portfolio）モデルとは何か？", a: "McKinseyのPeter Kraljicが1983年に提唱した、購買品目を「供給リスク」と「財務的インパクト（コスト影響度）」の2軸で4分類し、それぞれに適した購買戦略を導く手法。" },
  { id: 1163, cat: "SCM実践理論", q: "クラリッチモデルにおける「レバレッジ品目（Leverage products）」の特徴と推奨戦略は？", a: "財務的インパクトが大きいが供給市場リスクが低い品目（例：家具メーカーにとっての木材）。競合入札（competitive bidding）により複数サプライヤーから有利な価格を引き出す戦略が推奨される。" },
  { id: 1164, cat: "SCM実践理論", q: "クラリッチモデルにおける「日常品目（Routine products）」の特徴と推奨戦略は？", a: "財務的インパクトも供給リスクも低い品目（例：ねじ・バネなどの標準部品）。システム契約とeコマースを組み合わせた発注の仕組み化が推奨され、入札は種類の多さ・低コストゆえに非効率とされる。" },
  { id: 1165, cat: "SCM実践理論", q: "クラリッチモデルにおける「戦略品目（Strategic products）」の特徴と推奨戦略は？", a: "財務的インパクトが大きく供給リスクも高い品目（例：自動車エンジン）。単なる購買ではなく、サプライヤーと共同開発を行う「パフォーマンス・ベースド・パートナーシップ」が推奨される。" },
  { id: 1166, cat: "SCM実践理論", q: "クラリッチモデルにおける「ボトルネック品目（Bottleneck products）」の特徴と推奨戦略は？", a: "財務的インパクトは必ずしも大きくないが、供給リスクが非常に高く入手困難な品目（例：排ガス浄化装置に使う希少金属）。供給の確保と並行して代替材料・設計の模索を行う戦略が推奨される。" },
  { id: 1167, cat: "SCM実践理論", q: "サプライヤー選定における3つの評価アプローチとは？", a: "製品（試作品の品質・技術仕様・納期条件）に基づく選定、サプライヤーの能力（設計開発力・技術投資・マネジメント力）に基づく選定、両者を組み合わせた選定の3つ。" },
  { id: 1168, cat: "SCM実践理論", q: "サプライヤー選定ツールの「カテゴリカル法（categorical method）」とは？", a: "品質・納期・サービスなどの基準ごとに各サプライヤーを良好（+）・不満足（-）・中立（0）で評価し、合計点で選定する簡便な方法。主観に偏りやすいため多職能チームでの判断が推奨される。" },
  { id: 1169, cat: "SCM実践理論", q: "サプライヤー選定ツールの「コスト比率法（cost ratio method）」とは？", a: "品質・納期・サービスなど各基準について過去の実績データからペナルティコスト比率を算出し、見積単価に加算して純調整コストを求め、最終的にコストが最も低いサプライヤーを選ぶ方法。" },
  { id: 1170, cat: "SCM実践理論", q: "サプライヤー選定ツールの「線形加重平均法（linear-average method）」とは？", a: "各選定基準に重要度に応じた重み（合計100点）を割り当て、評価点に重みを掛けた加重スコアを合計して総合点を出す選定方法。他の手法（カテゴリカル法やコスト比率法）にも重み付けを組み合わせられる。" },
  { id: 1171, cat: "SCM実践理論", q: "購買機能の発展を「業務フォーカス」の観点で4段階に分類すると何か？", a: "①製品中心購買、②プロセス中心購買、③リレーショナル購買（組織間関係を重視）、④パフォーマンス中心購買（事業全体の成果に貢献）の4段階。" },
  { id: 1172, cat: "SCM実践理論", q: "購買機能の発展を「性格特性」の観点で4段階に分類すると何か？", a: "①受動的（passive：価格と入手可能性のみで選定）、②独立的（independent：技術は導入済みだが戦略との整合は未達）、③支援的（supportive：サプライヤーを競争資源とみなす）、④統合的（integrative：購買戦略が全社戦略に完全統合）の4段階。" },
  { id: 1173, cat: "SCM実践理論", q: "「ナレッジ・ベースド・パーチェシング（知識基盤型購買）」とは何を指すか？", a: "全社の事業目標や利害関係者の関心、サプライヤーの能力と可能性、人と文化・感情への理解、技術動向への知見など、複数領域の知識を土台に行う将来型の購買のあり方。" },
  { id: 1174, cat: "SCM実践理論", q: "サプライチェーンにおける「ダイアド関係（dyadic relationship）」とは？", a: "1つの供給者と1つの買い手の間だけで観察される、1対1の供給関係のこと。" },
  { id: 1175, cat: "SCM実践理論", q: "供給関係の「価値」は実務上どのように測定できるとされるか？", a: "関係を交換（exchange）の一形態と捉え、当事者間で実際に何が交換されているか（価格・数量のみか、ビジョンや共同開発情報まで含むか）によってその関係の親密度を判別できるとされる。" },
  { id: 1176, cat: "SCM実践理論", q: "トヨタ系日本自動車産業に由来する「クローズ・パートナーシップ」の主要な実践内容を挙げよ。", a: "サプライヤー基盤を絞り込んだ階層型供給網の構築、長期契約の重視、単一発注（シングルソーシング）の優先、新製品開発への早期関与、価格重視から品質重視の購買への転換、JIT生産方式の導入。" },
  { id: 1177, cat: "SCM実践理論", q: "Lamming（1993）が提唱したクローズ・パートナーシップの成功要因モデルは何要因から成るか？", a: "競争の性質、調達意思決定の基盤、情報交換の役割、キャパシティ管理、納入慣行、価格変動への対応、品質への姿勢、研究開発の役割、プレッシャーの水準の9要因。" },
  { id: 1178, cat: "SCM実践理論", q: "戦略的アライアンス（strategic alliance）の3つの構造タイプとは？", a: "水平アライアンス（同一階層の異なるサプライチェーン間）、垂直アライアンス（同一サプライチェーン内の異なる階層間）、ラテラルアライアンス（顧客企業と物流サービス提供者の間）。" },
  { id: 1179, cat: "SCM実践理論", q: "アライアンス発展の継続的プロセスモデルにおける「4つのC」とは何か？", a: "アライアンスの実装を左右する要因として挙げられる、目標の両立性（Compatible goals）、協調的文化（Cooperative culture）、補完的スキル（Complementary skills）、見合ったリスク（Commensurate risks）の4つ。" },
  { id: 1180, cat: "SCM実践理論", q: "サプライヤー・バイヤー関係における「囚人のジレンマ」型のジレンマとは何を指すか？", a: "信頼に基づく協調は双方にとって最善だが、相手に裏切られるリスクがあるため、双方とも合理的に非協力（裏切り）を選んでしまいがちだという、関係構築上の根本的なジレンマ。" },
  { id: 1181, cat: "SCM実践理論", q: "供給関係における「閉じ込め（cage）」のジレンマとは何か？", a: "高い関与度の緊密な関係は成長の原動力になる一方で、既存のやり方に縛られ変化への対応力を制限し、より良いサプライヤーへの乗り換えの機会を逃す制約要因にもなるというジレンマ。" },
  { id: 1182, cat: "SCM実践理論", q: "関係構築におけるコストと便益の経済モデルから導かれる3つの原則とは？", a: "関係が近くなるほどコストも増大すること、一定水準を超えると近さのコストが便益を上回り非効率になること、便益とコストの比が最大となる「最適な近さ」の水準が必ず存在すること。" },
  { id: 1183, cat: "SCM実践理論", q: "サプライチェーン統合（Supply Chain Integration）の概念的定義とは？", a: "法的に独立した複数の参加企業が、あたかも1つの企業であるかのように、共通の目標達成に向けてシームレスに連携・調整すること。" },
  { id: 1184, cat: "SCM実践理論", q: "サプライチェーン統合フレームワークにおける8つの管理ディメンションとは？", a: "顧客関係管理、顧客サービス管理、需要管理、オーダーフルフィルメント、製造フロー管理、サプライヤー関係管理、製品開発・商業化、リターンズマネジメント（返品管理）の8つ。" },
  { id: 1185, cat: "SCM実践理論", q: "顧客中心型サプライチェーンへの転換で応用されるマッキンゼーの7Sフレームワークとは？", a: "組織の有効性を高めるために整合させるべき7つの内部要素（戦略・組織構造・システムの「ハード」3要素と、共有価値・スタイル・人材・スキルの「ソフト」4要素）からなるモデル。" },
  { id: 1186, cat: "SCM実践理論", q: "サプライチェーンの関係管理における「ポートフォリオ・ダイナミズム」と「経時的ダイナミズム」とは？", a: "ポートフォリオ・ダイナミズムは製品カテゴリーや市場区分に応じて複数の異なる関係アプローチを併用する必要性を指し、経時的ダイナミズムは時間の経過に伴い関係のあり方自体が変化していくことを指す。" },
  { id: 1187, cat: "SCM実践理論", q: "Hau Lee教授が提唱した「トリプルA・サプライチェーン」モデルの3要素とは？", a: "俊敏性（Agility：需給の急変に迅速対応する能力）、適応力（Adaptability：長期的・不可逆的な環境変化に構造的に対応する能力）、整合性（Alignment：サプライチェーン参加者全体の利害を調整し一体性を保つ能力）。" },
  { id: 1188, cat: "SCM実践理論", q: "将来のサプライチェーンの構造的ダイナミクスを増大させる要因として挙げられているものは？", a: "事業の専門特化が進むことによる連携の複雑化、サプライチェーンの地理的拡大による物流遅延や法制度・文化の違い、環境意識の高まり（カーボンフットプリントのKPI化）による構造変化の3つ。" },
  { id: 1189, cat: "SCM実践理論", q: "「リーン（lean）」という用語はどのような研究プログラムから生まれたか？", a: "MIT（マサチューセッツ工科大学）が主導した国際自動車調査プログラムIMVP（International Motor Vehicle Programme）の研究成果として提唱された。書籍『The Machine that Changed the World』で定義が広まった。" },
  { id: 1190, cat: "SCM実践理論", q: "リーン生産方式（TPS）が大量生産方式と異なる2つの主要な特徴は？", a: "（1）ムダ・エラーの排除による効率向上、（2）小ロット生産による在庫保有コストの削減。" },
  { id: 1191, cat: "SCM実践理論", q: "大量生産方式（mass supply system）における部品調達の一般的な問題点は？", a: "価格のみで供給者を選定するため、供給者は低価格で受注後に価格改定で値上げを狙い、情報共有もされず、設計への早期関与もないため、コスト・品質面で不利益が生じやすい。" },
  { id: 1192, cat: "SCM実践理論", q: "リーン・サプライにおける第1階層サプライヤー数の目安は、大量生産方式と比べてどう違うか？", a: "大量生産方式では5000～8000社规模だが、リーン・サプライでは第1階層サプライヤー（サプライベース）を200～300社程度に絞り込み、密接な関係を構築する。" },
  { id: 1193, cat: "SCM実践理論", q: "リーン・サプライにおけるサプライヤー選定基準の考え方は？", a: "価格だけでなく、品質水準・研究開発力・納期信頼性・マネジメント体制・関係性など、より高次の総合的な業績基準に基づいて選定する。" },
  { id: 1194, cat: "SCM実践理論", q: "リーン・サプライが好むソーシング戦略と、その主な利点・リスクは？", a: "単一調達（シングルソーシング）または二社調達（デュアルソーシング）を好む。利点は規模の経済によるコスト最小化・開発の一元化・信頼関係構築。リスクは供給途絶や競争欠如による慢心。" },
  { id: 1195, cat: "SCM実践理論", q: "リーン・サプライにおける「マーケット価格マイナス」方式とは何か？", a: "市場価格を調査・ベンチマークで把握し、そこから妥当な利益マージンを差し引いて目標原価（ターゲットコスト）を設定し、供給者の実コストがそれを上回る場合は両者協力してコスト低減を図る価格決定手法。従来の「供給者コストプラスマージン」方式に代わるもの。" },
  { id: 1196, cat: "SCM実践理論", q: "リーン・サプライにおける新製品開発（NPI）でのサプライヤーの関わり方は？", a: "設計・企画段階からサプライヤーを早期に巻き込み、技術者が買い手の拠点に常駐するなどして共同開発を行い、後工程での問題を設計段階で解消する。" },
  { id: 1197, cat: "SCM実践理論", q: "リーン・サプライにおける「同期化された柔軟な生産能力」とは？", a: "サプライチェーン各段階の生産能力を固定せず、需要変動に応じて迅速に増減・転換できるようにし、供給者と買い手の能力を同期させて全体最適を図る仕組み。" },
  { id: 1198, cat: "SCM実践理論", q: "リーン・サプライにおけるインセンティブ・報酬の整合の具体例は？", a: "供給者が効率改善でコスト削減を達成した場合、その節約分の一定割合（例：50%）を供給者自身の利益として残させ、コスト削減や品質向上への貢献を新規受注拡大で報いる仕組み。" },
  { id: 1199, cat: "SCM実践理論", q: "「コスト・トゥ・サーブ（cost-to-serve）」とは何か？", a: "総コストが一定のとき、顧客が知覚する価値・サービスが大きいほど低くなる指標。リーンの本質は単なるコスト削減ではなく、付加価値を生まないコスト（ムダ）を削減してコスト・トゥ・サーブを最小化することにある。" },
  { id: 1200, cat: "SCM実践理論", q: "トヨタが定めた「付加価値活動」の3つの原則基準は？", a: "（1）物理的な変化を伴うこと、（2）顧客が関心を持つこと、（3）一度で正しく行われること（right first time）。" },
  { id: 1201, cat: "SCM実践理論", q: "リーン・サプライチェーンを実現する6つのドライバーを挙げよ。", a: "（1）ムダの削減、（2）需要管理、（3）プロセス標準化、（4）人材の巻き込み（エンゲージメント）、（5）協働（コラボレーション）、（6）継続的改善。" },
  { id: 1202, cat: "SCM実践理論", q: "リーンにおける「ムダの削減」ドライバーで注意すべき点は？", a: "ムダはサプライチェーン全体の視点で評価すべきで、自社の在庫負担を単に供給者に移転しただけでは真のムダ削減にならない（コストが移動しただけ）。" },
  { id: 1203, cat: "SCM実践理論", q: "リーンにおける「プロセス標準化」ドライバーが目指すものは？", a: "計画・生産などのプロセスを標準化して複雑性を減らし、機能別のサイロではなく価値の流れ（バリューストリーム）に沿った継続的なフローを実現すること。" },
  { id: 1204, cat: "SCM実践理論", q: "リーンの「継続的改善」で知られる日本語由来の手法名と、その特徴を挙げよ。", a: "カイゼン（Kaizen）。特徴は、大きな一発の変革ではなく多くの小さな改善の積み重ね、現場の作業者からのアイデア、多くが資本投資を要しない、全従業員の参加、自身の業務への当事者意識の醸成。" },
  { id: 1205, cat: "SCM実践理論", q: "「リーン・プロセスマッピングツール」の目的は何か？", a: "生産ラインやサプライチェーンにおけるモノの流れを可視化し、ムダの所在を発見し、ボトルネックの特定と改善優先順位付けを支援するためのツール群。" },
  { id: 1206, cat: "SCM実践理論", q: "バリューストリームマッピング（Value Stream Mapping）とは何か？", a: "調達・受注処理・生産プロセスなど、供給者から顧客に至る一連の流れの中で、付加価値活動とムダを可視化するリーン・プロセスマッピングツール。" },
  { id: 1207, cat: "SCM実践理論", q: "サプライチェーン・レスポンス・マトリクスとは何か？", a: "一定の顧客サービス水準を維持するためにサプライチェーンで発生する在庫量とリードタイムを評価し、在庫保有の必要性を判断するためのマッピングツール。" },
  { id: 1208, cat: "SCM実践理論", q: "生産バラエティ・ファネル（Production Variety Funnel）とは何か？", a: "製造プロセスの各段階における製品バリエーション数を図示し、汎用製品が顧客仕様化していく分岐点を特定するマッピング手法。" },
  { id: 1209, cat: "SCM実践理論", q: "品質フィルターマッピング（Quality Filter Mapping）とは何か？", a: "受注処理プロセスやサプライチェーン全体において、バリューストリームのどこで品質不良（欠陥）が発生しているかを種類別に可視化するツール。" },
  { id: 1210, cat: "SCM実践理論", q: "アジャイル・サプライチェーンが求められる背景（リーンだけでは不十分とされる理由）は？", a: "リーンは予測に基づく大量生産型産業から発展したモデルであり、市場の差別化要因がコストと信頼性である場合に適する。しかし現代市場の多くは多様性が支配的でスピードと即応性が差別化要因となっており、リーンだけでは対応できないため。" },
  { id: 1211, cat: "SCM実践理論", q: "アジャイル・サプライチェーンの核となる考え方は何か？", a: "組織構造・情報システム・物流プロセス・企業文化などサプライチェーン全体にわたる能力として、需要の急な変化に迅速かつ柔軟に対応し、自社の製品カテゴリー中心ではなく最終消費者中心に構造を転換する能力。" },
  { id: 1212, cat: "SCM実践理論", q: "リーンとアジャイルは、どのような需要・供給リードタイムの組み合わせでそれぞれ適するか？", a: "供給リードタイムが長く需要が予測可能な場合はリーンモデルが最適。供給リードタイムが短く需要が予測不可能な場合はアジャイルの即応性が最適となる。" },
  { id: 1213, cat: "SCM実践理論", q: "Mason-Jonesらの比較研究によると、リーン・サプライとアジャイル・サプライで典型的な製品・市場特性はそれぞれ何か？", a: "リーン・サプライはコモディティ製品・予測可能な市場・低バラエティ・長い製品ライフサイクル・低利益率が特徴。アジャイル・サプライはファッション性製品・不安定な市場・高バラエティ・短い製品ライフサイクル・高利益率が特徴。" },
  { id: 1214, cat: "SCM実践理論", q: "Harrison（1999）が提唱したアジャイル・サプライチェーンの枠組みにおける4つの主要構成要素を挙げよ。", a: "（1）バーチャル・インテグレーション（仮想統合）、（2）マーケット・センシティビティ（市場感応性）、（3）プロセス統合の強化、（4）ダイナミック・ネットワークに基づく構造。" },
  { id: 1215, cat: "SCM実践理論", q: "アジャイル・サプライチェーンにおける「バーチャル・インテグレーション」とは何か？", a: "資本所有による垂直統合を伴わずに、共有された目標のもとで各事業部門や供給網の各セクター間に非公式で柔軟・動的な関係を築く統合形態。" },
  { id: 1216, cat: "SCM実践理論", q: "アジャイル・サプライチェーンにおける「マーケット・センシティビティ」とは何か？", a: "サプライチェーンの内部指標や業績評価を、外部市場の実データと直接連動させること。内部・外部の顧客をすべて最終消費者につなげ、市場変化を素早く感知して対応する能力を指す。" },
  { id: 1217, cat: "SCM実践理論", q: "アジャイル・サプライチェーンが「ダイナミック・ネットワーク」を好む理由は？", a: "供給者と買い手の結びつきが固定的な階層構造（スタティック・ネットワーク）より緩やかで、短期契約や仮想的な関係、高度な情報開示に基づき、市場の急変に応じて即座に取引関係を切り替えられるため、より優れた形態とされる。" },
  { id: 1218, cat: "SCM実践理論", q: "アジャイル・サプライチェーンにおける「注文分離点（order decoupling point）」とは何か？", a: "顧客の個別注文がサプライチェーンにおいてどこまで見える形で反映されるかを示す境界点。この点より下流は需要に応じた「プル」型、上流は予測に基づく「プッシュ」型で運用される。" },
  { id: 1219, cat: "SCM実践理論", q: "ポストポーンメント（延期）戦略とは何か？", a: "注文分離点をできるだけ製品出荷に近い後工程まで遅らせることで、上流は集約需要に基づく低コストな汎用部品の量産（リーン的）を行い、下流は実際の注文に応じた組立・構成（アジャイル的）を行う戦略。" },
  { id: 1220, cat: "SCM実践理論", q: "ポストポーンメント戦略における「戦略的在庫（strategic inventory）」とは何か？", a: "注文分離点の直前、すなわちリーンな汎用部品生産工程の終端に蓄積される、まだ顧客仕様に組み立てられていない汎用部品の在庫のこと。" },
  { id: 1221, cat: "SCM実践理論", q: "アジャイル・サプライチェーンで重視される代表的なKPIを4つ以上挙げよ。", a: "市場投入までの設計期間、顧客満足度、生産スループット、納期リードタイム、市場での製品の入手可能性、生産能力の同期・最適化、コスト・トゥ・サーブ、製品更新頻度、サービスの革新性・柔軟性など。" },
  { id: 1222, cat: "SCM実践理論", q: "アジャイル・サプライチェーンを実現するための組織構造変更の方向性は？", a: "垂直統合の範囲を狭くし、有能なサプライヤーとのアウトソーシング網を活用し、意思決定を分権化してフラットな組織構造・高い権限委譲を進めること。" },
  { id: 1223, cat: "SCM実践理論", q: "アジャイル・サプライチェーンにおけるIT投資の考え方の特徴は？", a: "ハードウェアは硬直的で市場間の転用が難しく急速に減価するため、資産を所有するよりもレンタルやサービス利用によって柔軟性を確保する方が望ましいとされる。" },
];

const CATS = ["すべて", ...Array.from(new Set(DECK.map(c => c.cat)))];
const STORAGE_KEY = "scmFlashcardsProgress_v1";

function loadProgress() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch (e) { return {}; }
}
function saveProgress(p) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}

let progress = loadProgress();
let activeDeck = [...DECK];
let idx = 0;
let flipped = false;

const categorySelect = document.getElementById("categorySelect");
const modeSelect = document.getElementById("modeSelect");
const card = document.getElementById("card");
const qText = document.getElementById("qText");
const aText = document.getElementById("aText");
const badgeFront = document.getElementById("badgeFront");
const badgeBack = document.getElementById("badgeBack");
const indexFront = document.getElementById("indexFront");
const indexBack = document.getElementById("indexBack");
const statsText = document.getElementById("statsText");
const masteredText = document.getElementById("masteredText");
const progressFill = document.getElementById("progressFill");
const cardWrap = document.getElementById("cardWrap");
const emptyState = document.getElementById("emptyState");

CATS.forEach(c => {
  const opt = document.createElement("option");
  opt.value = c;
  opt.textContent = c;
  categorySelect.appendChild(opt);
});

function buildDeck() {
  const cat = categorySelect.value;
  const mode = modeSelect.value;
  let deck = cat === "すべて" ? [...DECK] : DECK.filter(c => c.cat === cat);
  if (mode === "unknown") {
    deck = deck.filter(c => (progress[c.id]?.status) !== "known");
  }
  activeDeck = deck;
  idx = 0;
  flipped = false;
  card.classList.remove("flipped");
  render();
}

function render() {
  const totalAll = (categorySelect.value === "すべて" ? DECK.length : DECK.filter(c => c.cat === categorySelect.value).length);
  const masteredAll = DECK.filter(c => (categorySelect.value === "すべて" || c.cat === categorySelect.value) && progress[c.id]?.status === "known").length;

  if (activeDeck.length === 0) {
    card.style.display = "none";
    emptyState.style.display = "block";
    statsText.textContent = `0 / ${totalAll}`;
    masteredText.textContent = `習得済み: ${masteredAll}`;
    progressFill.style.width = totalAll ? `${(masteredAll/totalAll)*100}%` : "0%";
    return;
  }

  card.style.display = "";
  emptyState.style.display = "none";

  const c = activeDeck[idx];
  qText.textContent = c.q;
  aText.textContent = c.a;
  badgeFront.textContent = c.cat;
  badgeBack.textContent = c.cat;
  indexFront.textContent = `${idx + 1} / ${activeDeck.length}`;
  indexBack.textContent = `${idx + 1} / ${activeDeck.length}`;

  statsText.textContent = `${idx + 1} / ${activeDeck.length}`;
  masteredText.textContent = `習得済み: ${masteredAll} / ${totalAll}`;
  progressFill.style.width = totalAll ? `${(masteredAll/totalAll)*100}%` : "0%";
}

function flip() {
  flipped = !flipped;
  card.classList.toggle("flipped", flipped);
}

function goNext() {
  if (activeDeck.length === 0) return;
  idx = (idx + 1) % activeDeck.length;
  flipped = false;
  card.classList.remove("flipped");
  render();
}

function markStatus(status) {
  if (activeDeck.length === 0) return;
  const c = activeDeck[idx];
  progress[c.id] = { status, lastReviewed: Date.now() };
  saveProgress(progress);
  if (modeSelect.value === "unknown" && status === "known") {
    const wasLast = idx >= activeDeck.length - 1;
    activeDeck.splice(idx, 1);
    if (activeDeck.length === 0) { render(); return; }
    idx = wasLast ? 0 : idx % activeDeck.length;
    flipped = false;
    card.classList.remove("flipped");
    render();
  } else {
    goNext();
  }
}

function shuffle() {
  for (let i = activeDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [activeDeck[i], activeDeck[j]] = [activeDeck[j], activeDeck[i]];
  }
  idx = 0;
  flipped = false;
  card.classList.remove("flipped");
  render();
}

card.addEventListener("click", flip);
document.getElementById("knownBtn").addEventListener("click", () => markStatus("known"));
document.getElementById("unknownBtn").addEventListener("click", () => markStatus("unknown"));
document.getElementById("shuffleBtn").addEventListener("click", shuffle);
categorySelect.addEventListener("change", buildDeck);
modeSelect.addEventListener("change", buildDeck);
document.getElementById("resetProgressBtn").addEventListener("click", () => {
  if (confirm("すべての学習進捗をリセットしますか？")) {
    progress = {};
    saveProgress(progress);
    buildDeck();
  }
});

document.addEventListener("keydown", (e) => {
  const tag = e.target.tagName;
  if (tag === "SELECT" || tag === "INPUT" || tag === "TEXTAREA") return;
  if (e.code === "Space") { e.preventDefault(); flip(); }
  if (e.key === "1") markStatus("unknown");
  if (e.key === "2") markStatus("known");
});

buildDeck();
</script>
